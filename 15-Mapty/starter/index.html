<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="X-UA-Compatible"
      content="ie=edge" />
    <link
      rel="shortcut icon"
      type="image/png"
      href="/icon.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="./static/css/output.css" />
    <!-- import leaflet most recent stable version -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""></script>
    <script
      defer
      src="./static/js/script.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <title>mapty // Map your workouts</title>
  </head>
  <body x-data="mapty">
    <div class="sidebar">
      <img
        src="logo.png"
        alt="Logo"
        class="logo" />

      <ul class="workouts">
        <!-- POI Workout form -->
        <form
          @submit.prevent="customSubmit"
          x-show="showForm"
          x-effect="showForm && $nextTick(() => $refs.kms.focus())"
          class="form">
          <div class="form__row">
            <label class="form__label">Type</label>
            <select
              x-model="type"
              class="form__input form__input--type">
              <option value="running">Running</option>
              <option value="cycling">Cycling</option>
            </select>
          </div>
          <div class="form__row">
            <label class="form__label">Distance</label>
            <input
              x-ref="kms"
              x-model="distance"
              class="form__input form__input--distance"
              placeholder="km" />
          </div>
          <div class="form__row">
            <label class="form__label">Duration</label>
            <input
              x-model="duration"
              class="form__input form__input--duration"
              placeholder="min" />
          </div>
          <div
            x-show="type === 'running'"
            class="form__row">
            <label class="form__label">Cadence</label>
            <input
              x-model="cadence"
              class="form__input form__input--cadence"
              placeholder="step/min" />
          </div>
          <div
            x-show="type === 'cycling'"
            class="form__row">
            <label class="form__label">Elev Gain</label>
            <input
              x-model="elevation"
              class="form__input form__input--elevation"
              placeholder="meters" />
          </div>
          <div x-show="errorMsg">
            <p x-text="errorMsg"></p>
          </div>
          <button class="form__btn">OK</button>
        </form>

        <ul>
          <!-- Rendering workouts as a list -->
          <template
            x-for="workout in $store.workouts.workoutObjs"
            :key="workout.id">
            <li
              @click="workout.moveToMarker"
              :class="`workout--${workout.type}`"
              class="workout"
              :data-id="workout.id">
              <h2
                class="workout__title"
                x-text="`${workout.type} - ${workout.distance}`"></h2>
              <div class="workout__details">
                <span
                  class="workout__icon"
                  x-text="workout.type === 'running' ? '🏃‍♂️' : '🚲'"></span>
                <span
                  class="workout__value"
                  x-text="workout.distance"></span>
                <span class="workout__unit">km</span>
              </div>
              <div class="workout__details">
                <span class="workout__icon">⏱</span>
                <span
                  class="workout__value"
                  x-text="workout.duration"></span>
                <span class="workout__unit">min</span>
              </div>
              <!-- Pace -->
              <div class="workout__details">
                <span class="workout__icon">⚡️</span>
                <span
                  class="workout__value"
                  x-text="workout.pace"></span>
                <span class="workout__unit">min/km</span>
              </div>
              <!-- Conditional cadence or elevation -->
              <template x-if="workout.type === 'running'">
                <div class="workout__details">
                  <span class="workout__icon">🦶🏼</span>
                  <span
                    class="workout__value"
                    x-text="workout.cadence"></span>
                  <span class="workout__unit">spm</span>
                </div>
              </template>
              <template x-if="workout.type === 'cycling'">
                <div class="workout__details">
                  <span class="workout__icon">⛰</span>
                  <span
                    class="workout__value"
                    x-text="workout.elevation"></span>
                  <span class="workout__unit">m</span>
                </div>
              </template>
              <button
                @click.stop="$store.workouts.remove(workout)"
                class="bg-amber-400 my-4 px-8 py-6 rounded-lg text-gray-700 cursor-pointer">
                Delete
              </button>
            </li>
          </template>
        </ul>
      </ul>

      <p class="copyright">
        &copy; Copyright by
        <a
          class="twitter-link"
          target="_blank"
          href="https://twitter.com/jonasschmedtman"
          >Jonas Schmedtmann</a
        >. Use for learning or your portfolio. Don't use to teach. Don't claim as your own.
      </p>
    </div>

    <div id="map">
      <template x-if="errorMsg">
        <h1
          x-text="errorMsg"
          class="font-bold text-9xl text-center"></h1>
      </template>
    </div>
  </body>
</html>
